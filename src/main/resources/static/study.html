<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勉強モード - DOBOTORE</title>
    <link rel="stylesheet" href="css/style_Stady.css">
</head>
<body class="study-body">
<div class="index-wrapper"> <header class="quiz-header">
    <a href="index.html" class="back-link">TOPへ戻る</a>
    <div class="status-bar">
        <span>📖 勉強モード</span>
        <span id="accuracy-display">正答率 0% / 目標 0%</span>
        <span id="total-count">累計 0 問</span>
    </div>
</header>

    <main class="scrollable-content">
        <h3 id="question-meta" class="question-meta">年度 - No.</h3>

        <div class="wood-sign-board">
            <div class="board-content">
                <p id="question-text" class="question-text-on-wood">問題読み込み中...</p>
                <div id="q-image-area" class="q-image-area hidden">
                    <img id="question-img" src="" alt="問題図">
                </div>
            </div>
        </div>

        <div id="choices-container" class="choices-grid"></div>

        <div id="submit-area" class="submit-button-container">
            <button id="submit-btn" class="btn-answer-main" disabled>回答</button>
        </div>

        <div id="explanation-area" class="explanation-container hidden">
            <hr class="result-divider"> <div class="result-header">
            <h3 id="result-msg"></h3>
            <button id="next-btn" class="btn-next-custom">次の問題</button>
        </div>

            <div class="explanation-content">
                <p class="explanation-label">[ 解説 ]</p>
                <p id="explanation-text" class="explanation-text-box"></p>
            </div>
        </div>
    </main>
</div>


<script src="js/questionsA.js"></script>
<script src="js/questionsB.js"></script>
<script src="js/stady_script.js"></script>
</body>
</html>
